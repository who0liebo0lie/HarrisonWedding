<!DOCTYPE html><html><head><meta charset="utf-8"><title>Add guests</title>
<style>body{font-family:system-ui,sans-serif;max-width:640px;margin:40px auto;padding:0 20px;color:#2B0F1A;}
h1{color:#7A1438;} textarea,input{width:100%;padding:12px;font-size:15px;border:1.5px solid #efd9cf;border-radius:8px;}
button{background:#E8631C;color:#fff;border:none;padding:12px 22px;border-radius:999px;margin-top:12px;cursor:pointer;font-size:15px;}
pre{background:#FFF6EF;padding:16px;border-radius:10px;white-space:pre-wrap;word-break:break-all;}</style></head><body>
<h1>Add guests to the list</h1>
<p>Type one guest name per line, then click Generate. Copy the result and paste it into the
<code>GUESTLIST=[...]</code> line inside <code>index.html</code>.</p>
<textarea id="names" rows="10" placeholder="Jane Smith&#10;John Smith&#10;Maria Garcia"></textarea>
<button onclick="go()">Generate</button>
<h3>Paste this into index.html</h3><pre id="out">—</pre>
<script>
async function sha16(s){const d=new TextEncoder().encode("cjk26:"+s.toLowerCase().replace(/[^a-z]/g,""));
const b=await crypto.subtle.digest('SHA-256',d);
return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('').slice(0,16);}
async function go(){const lines=document.getElementById('names').value.split('\n').map(x=>x.trim()).filter(Boolean);
const hs=[];for(const l of lines){hs.push('"'+await sha16(l)+'"');}
document.getElementById('out').textContent='const GUESTLIST=['+hs.join(',')+'];';}
</script></body></html>
